openapi: 3.0.3
info:
  title: kusa GAI API
  version: "1.1.0"
  description: |
    Unified OpenAPI specification generated by merging the existing external file
    with a new endpoint discovered from HTTP logs. Includes light refactoring:
    - Unified i18n schema as I18nText (flexible locale map with common en/ja keys)
    - Normalized cookie-based auth to `next-session`
    - Unified Avatar schema used by tools and presets (keeps legacy key "0" as deprecated)

tags:
  - name: Auth
  - name: Conversation
  - name: Tools
  - name: Chat
  - name: Presets

paths:
  /api/auth/password/login:
    post:
      tags: [Auth]
      summary: ログイン
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
      responses:
        "200":
          description: ログイン成功（レスポンスボディは空）
        "400":
          description: 認証失敗（パスワード不一致など）
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
        "500":
          description: Internal server error

  /api/auth/probe:
    post:
      tags: [Auth]
      summary: 認証方式の事前判定
      description: |
        指定したメールアドレスに対して、パスワードログイン可否および
        利用可能な外部認証プロバイダ一覧を返す。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthProbeRequest"
      responses:
        "200":
          description: 認証方式の判定結果
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthProbeResponse"
        "400":
          description: リクエスト不正
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error

  /api/conversation/overview:
    get:
      tags: [Conversation]
      summary: 会話履歴取得
      parameters:
        - name: page_size
          in: query
          required: false
          schema:
            type: integer
            default: 50
      security:
        - cookieAuth: []
      responses:
        "200":
          description: 会話履歴取得成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      history:
                        type: object
                        properties:
                          today:
                            type: object
                            properties:
                              count:
                                type: integer
                          sevenDays:
                            type: object
                            properties:
                              count:
                                type: integer
                          monthly:
                            type: array
                            items:
                              type: object
                              properties:
                                date:
                                  type: string
                                  format: date
                                count:
                                  type: integer
                          conversation:
                            nullable: true
                      latestConversations:
                        type: array
                        items:
                          $ref: "#/components/schemas/Conversation"

  /api/tools:
    get:
      tags: [Tools]
      summary: ツール一覧取得
      security:
        - cookieAuth: []
      responses:
        "200":
          description: ツール一覧取得成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Tool"

  /api/chat:
    post:
      tags: [Chat]
      summary: チャットメッセージ送信
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - content
              properties:
                attachmentUuids:
                  type: array
                  items:
                    type: string
                    format: uuid
                configuredTools:
                  type: array
                  description: ツール一覧APIで取得したツールの有効/無効設定
                  items:
                    type: object
                    properties:
                      uuid:
                        type: string
                        format: uuid
                      settings:
                        type: object
                        properties:
                          enabled:
                            type: boolean
                content:
                  type: string
                  description: ユーザーのメッセージ
                fastHeaders:
                  type: boolean
                  description: チャット最初のメッセージであればtrue
                isRetry:
                  type: boolean
                  description: 同内容のメッセージを再送信するときにtrue
                presetId:
                  type: integer
      responses:
        "200":
          description: チャット応答（プレーンテキスト）
          content:
            text/plain:
              schema:
                type: string

  /api/preset:
    get:
      tags: [Presets]
      summary: List presets and default preset
      description: Returns the list of available presets and the default preset UUID.
      operationId: listPresets
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Successful response with presets
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PresetListResponse"
        "401":
          description: Unauthorized (missing or invalid session)
        "403":
          description: Forbidden
        "500":
          description: Internal server error

components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: next-session
      description: ログイン後に発行される認証Cookie

  schemas:
    AuthProbeRequest:
      type: object
      required: [email, redirectURL]
      properties:
        email:
          type: string
          format: email
        redirectURL:
          type: string

    AuthProbeResponse:
      type: object
      required: [allowPassword, externalProviders]
      properties:
        allowPassword:
          type: boolean
        externalProviders:
          type: array
          items:
            type: string

    ErrorObject:
      type: object
      required: [ns, key]
      properties:
        ns:
          type: string
        key:
          type: string

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          $ref: "#/components/schemas/ErrorObject"

    I18nText:
      type: object
      description: |
        Locale-to-string map. Common keys are "en" and "ja". Additional locales are allowed.
      properties:
        en:
          type: string
        ja:
          type: string
      additionalProperties:
        type: string

    Avatar:
      type: object
      description: |
        Avatar descriptor for tools and presets. When `type` is `icon`, provide `icon`.
        When `type` is `image`, provide `path` (legacy key "0" is accepted but deprecated).
      required:
        - type
      properties:
        type:
          type: string
          enum: [icon, image]
        icon:
          type: string
        path:
          type: string
        "0":
          type: string
          deprecated: true
      additionalProperties: false

    Conversation:
      type: object
      properties:
        uuid:
          type: string
          format: uuid
        title:
          type: string
        generationTtl:
          type: integer
          nullable: true
        lastMessageAt:
          type: string
          format: date-time
        isOpenAIAssistant:
          type: boolean
        isBookmarked:
          type: boolean
        bookmarkedAt:
          type: string
          format: date-time
          nullable: true

    Tool:
      type: object
      properties:
        uuid:
          type: string
          format: uuid
        description:
          $ref: "#/components/schemas/I18nText"
        chatUsageNotes:
          $ref: "#/components/schemas/I18nText"
        avatar:
          $ref: "#/components/schemas/Avatar"
        updatedAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
        displayOrder:
          type: integer
          nullable: true
        initialDisplayOrder:
          type: integer
          nullable: true
        configurationRequired:
          type: array
          items:
            type: string
        externalServices:
          type: object
        disabledChatPartners:
          type: array
          items:
            type: object
            properties:
              uuid:
                type: string
                format: uuid
              name_en:
                type: string
              name_ja:
                type: string
        name:
          type: string
        displayName:
          $ref: "#/components/schemas/I18nText"

    PresetListResponse:
      type: object
      required: [presets, defaultPreset]
      properties:
        presets:
          type: array
          items:
            $ref: "#/components/schemas/Preset"
        defaultPreset:
          type: string
          format: uuid

    Preset:
      type: object
      required:
        - id
        - uuid
        - name
        - subtitle
        - avatar
        - featureFlag
        - featureFlags
        - showTools
        - position
        - notes
        - modelParameters
        - initial
        - isOpenAIAssistant
        - isFreeUsage
        - acceptsImageAttachment
        - acceptsEmbeddedAttachments
        - disallowedToolUuids
        - imageUploadSize
      properties:
        id:
          type: integer
        uuid:
          type: string
          format: uuid
        name:
          $ref: "#/components/schemas/I18nText"
        subtitle:
          $ref: "#/components/schemas/I18nText"
        avatar:
          $ref: "#/components/schemas/Avatar"
        featureFlag:
          type: string
        featureFlags:
          type: array
          items:
            type: string
        showTools:
          type: boolean
        position:
          type: integer
        notes:
          type: array
          items: {}
        modelParameters:
          $ref: "#/components/schemas/ModelParameters"
        initial:
          $ref: "#/components/schemas/InitialPrompts"
        isOpenAIAssistant:
          type: boolean
        isFreeUsage:
          type: boolean
        acceptsImageAttachment:
          type: boolean
        acceptsAudioAttachment:
          type: boolean
          nullable: true
        acceptsOpenAIFileAttachment:
          type: boolean
          nullable: true
        acceptsEmbeddedAttachments:
          type: boolean
        maxAudioDuration:
          type: integer
          nullable: true
        disallowedToolUuids:
          type: array
          items:
            type: string
            format: uuid
        cautions:
          oneOf:
            - $ref: "#/components/schemas/I18nText"
            - type: "null"
        imageUploadSize:
          type: integer

    ModelParameters:
      type: object
      properties:
        model:
          type: string
      additionalProperties: true

    InitialPrompts:
      type: object
      properties:
        en:
          type: array
          items: {}
        ja:
          type: array
          items: {}
      additionalProperties: true
